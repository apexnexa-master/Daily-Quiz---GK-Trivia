# Smaller heap + temp on D: — saves RAM and keeps JVM temp off full C: drive
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -Djava.io.tmpdir=D:/gradle-tmp -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=D:/gradle-tmp
org.gradle.workers.max=2
android.useAndroidX=true
# Jetifier is rarely needed with current AndroidX deps; disabling avoids extra transforms (disk + time).
android.enableJetifier=false
# Avoid Kotlin incremental cache crashes on some Windows setups (long paths / antivirus)
kotlin.incremental=false
