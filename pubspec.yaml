name: gk_quiz_app
description: Daily GK Quiz for Indian competitive exam aspirants
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.8.0
  firebase_analytics: ^10.9.0
  cloud_functions: ^4.6.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Google Sign-In
  google_sign_in: ^7.2.0

  # AdMob
  google_mobile_ads: ^5.0.0

  # Local caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Networking / utilities
  dio: ^5.4.3
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.2
  mockito: ^5.4.4

# To generate icons, run: flutter pub run flutter_launcher_icons
# Place your 1024x1024 icon at: assets/icon/app_icon.png

flutter:
  uses-material-design: true
